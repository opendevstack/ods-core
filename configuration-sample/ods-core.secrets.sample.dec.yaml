# OpenDevStack Helm Secret Values
# These are anonymized values for safe sharing
# WARNING: This file contains placeholder data and should be replaced for real deployments
# Use proper secret management tools and encryption for production environments
# Nexus Secrets
nexus:
    password: "<REDACTED>"
    passwordB64: "<BASE64_REDACTED>"
    adminPassword: "<REDACTED>"
    adminPasswordB64: "<BASE64_REDACTED>"
    auth: "<USERNAME>:<PASSWORD>"
# SonarQube Secrets
sonarqube:
    adminPasswordB64: "<BASE64_REDACTED>"
    authTokenB64: "<BASE64_REDACTED>"
    webAuthCodeB64: "<BASE64_REDACTED>"
    saml:
        providerIdB64: "<BASE64_REDACTED>"
        loginUrlB64: "<BASE64_REDACTED>"
        certificateB64: "<BASE64_REDACTED>"
    database:
        passwordB64: "<BASE64_REDACTED>"
        superPasswordB64: "<BASE64_REDACTED>"
# Provisioning App Secrets
provisioningApp:
    crowdPassword: "<REDACTED>"
    jasyptPassword: "<REDACTED>"
    mail:
        password: "<REDACTED>"
# Git / Bitbucket Credentials
gitCredentials:
    userId: user@example.com
    userIdB64: "<BASE64_REDACTED>"
    passwordB64: "<BASE64_REDACTED>"
# Pipeline Trigger Secrets
pipeline:
    triggerSecretB64: "<BASE64_REDACTED>"
    triggerSecret: "<UUID_REDACTED>"
# OpenTelemetry Collector Secrets
opentelemetry:
    collector:
        otlpApiToken: "<API_TOKEN_REDACTED>"
# CD User Token
cdUser:
    tokenB64: "<BASE64_REDACTED>"
